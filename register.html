<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

         li {
            padding-left: 20px;
        }

            padding: 20px;

    </style>
</head>
<body>
    <!-- navbar -->
    <div class="container-fluid"> <!--first row-->
        <div class="row">
            <nav class="navbar navbar-expand-lg" style="background-color:pink;" data-bs-theme="light">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">Flower</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <!-- <span class="navbar-toggler-icon"></span> -->
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent" style="padding-left: 40px;">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="login.html">Login</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="register.html">Register</a>
                            </li>
                        </ul>
                        <!-- <div class="d-flex">
                            <i class="bi bi-heart-fill" style="padding: 10px;"></i>
                            <i class="bi bi-cart-fill" style="padding: 10px;"></i>
                            <i class="bi bi-person-fill" style="padding: 10px;"></i>
                        </div> -->

                    </div>
                </div>
            </nav>
        </div>
    </div> <!-- end of first row-->
    
    <div class="container" style="margin-top:50px;" >
        <form class="col-md-4 mx-auto border shadow p-3 rounded mt-3" style="background-image: url(login.jpg); ">
            <h2 style="text-align: center;">Registration</h2>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Contact Number</label>
                <input type="text" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Email Id</label>
                <input type="email" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="text" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="text" class="form-control">
            </div>
    
            <button type="submit" class="btn btn-primary">Register</button><br>
            Already user? <a href="login.html">Login</a>
        </form>
    </div>

    <script src="bootstrap.bundle.min.js"></script>
